# Verify that the compiled ESM output works correctly in Deno 2.
name: Deno

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  deno:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Use Node.js 24.x (build only)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24.x

      - name: Install dependencies and build
        run: npm ci && npm run build

      - name: Set up Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2
        with:
          deno-version: v2.x

      - name: Deno smoke test
        run: deno run --allow-read --allow-env scripts/runtime-smoke.mjs
