name: Publish

# Triggered automatically when release-please merges a Release PR and creates a tag.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions: {}

jobs:
  publish:
    name: npm publish with provenance
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to update the GitHub Release created by release-please
      id-token: write # required for npm OIDC trusted publishing + provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish
        env:
          CI: true
